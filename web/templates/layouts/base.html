<!DOCTYPE html>
<html lang="{{.CurrentLang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mymood</title>
     <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VQXKP99WY7"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-VQXKP99WY7');
    </script>
    <meta name="description" content="{{call .T "meta.description"}}">
    <meta property="og:title" content="mymood">
    <meta property="og:description" content="{{call .T "meta.description"}}">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        base: '#0F0F14',
                        surface: '#16161F',
                    },
                    backgroundImage: {
                        'brand-gradient': 'linear-gradient(135deg, #7C3AED 0%, #EC4899 100%)',
                    },
                },
            },
        };
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body hx-boost="true" class="min-h-screen bg-base text-slate-100 font-sans antialiased">
    <div hx-boost="false" class="fixed right-3 top-3 z-[60] flex gap-1 text-xs">
        <a href="/lang/en" class="rounded px-2 py-1 {{if eq .CurrentLang "en"}}bg-white/20 font-semibold{{else}}bg-white/5 text-slate-400 hover:bg-white/10{{end}}">EN</a>
        <a href="/lang/tr" class="rounded px-2 py-1 {{if eq .CurrentLang "tr"}}bg-white/20 font-semibold{{else}}bg-white/5 text-slate-400 hover:bg-white/10{{end}}">TR</a>
    </div>
    {{if .ShowNav}}
    <nav class="sticky top-0 z-50 border-b border-white/10 bg-base/80 backdrop-blur-md">
        <div class="mx-auto flex max-w-5xl items-center justify-between gap-4 px-4 py-3">
            <a href="/feed" class="bg-brand-gradient bg-clip-text text-xl font-extrabold text-transparent">mymood</a>
            <div class="flex items-center gap-1 pr-16 sm:gap-2">
                <a href="/feed" class="nav-link">{{call .T "nav.feed"}}</a>
                <a href="/mood" class="nav-link">{{call .T "nav.today"}}</a>
                <a href="/friends" class="nav-link relative">
                    {{call .T "nav.friends"}}
                    {{if .PendingCount}}<span class="badge">{{.PendingCount}}</span>{{end}}
                </a>
                <a href="/profile" class="nav-link">{{call .T "nav.profile"}}</a>
                <a href="/settings" class="nav-link">{{call .T "nav.settings"}}</a>
                <form method="POST" action="/logout" class="inline">
                    <button type="submit" class="nav-link">{{call .T "nav.logout"}}</button>
                </form>
            </div>
        </div>
    </nav>
    {{end}}
    <div id="htmx-content" class="mx-auto max-w-5xl px-4 py-8">
        {{embed}}
    </div>
</body>
</html>
