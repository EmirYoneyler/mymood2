<main class="space-y-6">
    <div class="flex items-center gap-3">
        <a href="/profile" class="text-sm text-fuchsia-400 hover:text-fuchsia-300">← Profilime dön</a>
    </div>
    <h1 class="text-2xl font-extrabold">Aylık Ortalamalar</h1>

    {{if .Months}}
    <section class="glass-card divide-y divide-white/10 p-2">
        {{range .Months}}
        <a href="/profile?year={{.Year}}" class="flex items-center justify-between gap-3 px-4 py-3 transition hover:bg-white/5">
            <span class="font-medium">{{.Label}} {{.Year}}</span>
            <span class="flex items-center gap-3 text-sm">
                <span class="text-slate-500">{{.Count}} gün</span>
                <span class="font-bold text-fuchsia-300">{{.AverageText}}</span>
            </span>
        </a>
        {{end}}
    </section>
    {{else}}
    <div class="glass-card p-8 text-center text-slate-300">
        Henüz hiç mood girişin yok. <a href="/mood" class="font-medium text-fuchsia-400 hover:text-fuchsia-300">Bugünü puanla</a> ve burada görünsün.
    </div>
    {{end}}
</main>
