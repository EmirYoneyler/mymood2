<main class="space-y-6">
    <h1 class="text-2xl font-extrabold">Profilim</h1>

    <section class="grid grid-cols-3 gap-3 sm:gap-4">
        <div class="glass-card p-4 text-center sm:p-6">
            <span class="block text-2xl font-extrabold sm:text-3xl">{{.AverageScore}}</span>
            <span class="text-xs text-slate-400 sm:text-sm">Ortalama Mood</span>
        </div>
        <div class="glass-card p-4 text-center sm:p-6">
            <span class="block text-2xl font-extrabold sm:text-3xl">{{.LongestStreak}}</span>
            <span class="text-xs text-slate-400 sm:text-sm">En Uzun Streak</span>
        </div>
        <div class="glass-card p-4 text-center sm:p-6">
            <span class="block text-2xl font-extrabold sm:text-3xl">{{.TotalEntries}}</span>
            <span class="text-xs text-slate-400 sm:text-sm">Toplam Giriş</span>
        </div>
    </section>

    <section class="glass-card p-6">
        <h2 class="mb-4 text-lg font-bold">Mood Geçmişi</h2>
        <div class="heatmap-grid">
            {{range .Weeks}}
            <div class="heatmap-week">
                {{range .}}
                <div
                    class="heatmap-cell {{if .Future}}future{{else if .HasEntry}}level-{{.Score}}{{else}}level-0{{end}}"
                    title="{{.Date.Format "02 Jan 2006"}}{{if .HasEntry}} - {{.Score}}/10{{end}}"
                ></div>
                {{end}}
            </div>
            {{end}}
        </div>
    </section>
</main>
