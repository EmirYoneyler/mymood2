<main class="mx-auto max-w-lg space-y-6">
    <h1 class="text-2xl font-extrabold">Ayarlar</h1>

    {{if .Error}}
    <p class="rounded-lg border border-red-500/30 bg-red-500/10 px-3 py-2 text-sm text-red-300">{{.Error}}</p>
    {{end}}

    <section class="glass-card p-6">
        <h2 class="mb-3 text-sm font-bold text-slate-300">Hesap Bilgileri</h2>
        <ul class="space-y-2 text-sm">
            <li class="flex items-center justify-between"><span class="text-slate-400">Kullanıcı Adı</span><span class="font-semibold">@{{.Username}}</span></li>
            <li class="flex items-center justify-between"><span class="text-slate-400">E-posta</span><span class="font-semibold">{{.Email}}</span></li>
        </ul>
    </section>

    <section class="glass-card border-red-500/20 p-6">
        <h2 class="mb-2 text-sm font-bold text-red-300">Tehlikeli Bölge</h2>
        <p class="mb-4 text-sm text-slate-400">Hesabını sildiğinde tüm mood geçmişin, notların ve arkadaşlıkların kalıcı olarak silinir. Bu işlem geri alınamaz.</p>
        <form method="POST" action="/settings/delete" class="space-y-3" onsubmit="return confirm('Hesabını ve tüm verilerini kalıcı olarak silmek istediğine emin misin?');">
            <div>
                <label class="mb-1 block text-sm font-medium text-slate-300">Onaylamak için şifreni yaz</label>
                <input type="password" name="password" required
                    class="w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm outline-none transition focus:border-red-400/60 focus:ring-2 focus:ring-red-400/30">
            </div>
            <button type="submit"
                class="rounded-xl border border-red-400/40 px-4 py-2 text-sm font-semibold text-red-300 transition hover:bg-red-400/10 active:scale-95">
                Hesabımı Kalıcı Olarak Sil
            </button>
        </form>
    </section>
</main>
